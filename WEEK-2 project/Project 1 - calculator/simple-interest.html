<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <!-- Tab Buttons -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('interest')">Simple Interest</button>
                <button class="tab-btn" onclick="switchTab('scientific')">Scientific</button>
            </div>

            <!-- Simple Interest Calculator -->
            <div id="interestTab" class="tab-content active">
                <h1>Simple Interest Calculator</h1>

                <div class="input-section">
                    <div class="input-group">
                        <label for="principal">Principal Amount (₹)</label>
                        <input type="number" id="principal" placeholder="Enter amount" min="0">
                    </div>

                    <div class="input-group">
                        <label for="rate">Rate of Interest (%)</label>
                        <input type="number" id="rate" placeholder="Enter rate" min="0" step="0.01">
                    </div>

                    <div class="input-group">
                        <label for="time">Time Period (Years)</label>
                        <input type="number" id="time" placeholder="Enter time" min="0" step="0.01">
                    </div>

                    <button onclick="calculateInterest()" class="calculate-btn">Calculate</button>
                    <button onclick="resetForm()" class="reset-btn">Reset</button>
                </div>

                <div class="output-section">
                    <div class="output-group">
                        <label>Simple Interest</label>
                        <div class="output-value" id="simpleInterest">₹0.00</div>
                    </div>

                    <div class="output-group">
                        <label>Total Amount</label>
                        <div class="output-value" id="totalAmount">₹0.00</div>
                    </div>
                </div>
            </div>

            <!-- Scientific Calculator -->
            <div id="scientificTab" class="tab-content">
                <h1>Scientific Calculator</h1>

                <div class="sci-display">
                    <input type="text" id="display" class="display-input" placeholder="0" readonly>
                </div>

                <div class="sci-buttons">
                    <!-- First Row -->
                    <button onclick="appendDisplay('(')" class="btn">(</button>
                    <button onclick="appendDisplay(')')" class="btn">)</button>
                    <button onclick="appendDisplay('Math.PI')" class="btn">π</button>
                    <button onclick="clearDisplay()" class="btn btn-clear">AC</button>

                    <!-- Second Row -->
                    <button onclick="appendDisplay('Math.sqrt(')" class="btn">√</button>
                    <button onclick="appendDisplay('Math.pow(')" class="btn">x^y</button>
                    <button onclick="appendDisplay('Math.log(')" class="btn">log</button>
                    <button onclick="backspace()" class="btn btn-delete">DEL</button>

                    <!-- Third Row -->
                    <button onclick="appendDisplay('Math.sin(')" class="btn">sin</button>
                    <button onclick="appendDisplay('Math.cos(')" class="btn">cos</button>
                    <button onclick="appendDisplay('Math.tan(')" class="btn">tan</button>
                    <button onclick="appendDisplay('/')" class="btn btn-operator">÷</button>

                    <!-- Fourth Row -->
                    <button onclick="appendDisplay('7')" class="btn">7</button>
                    <button onclick="appendDisplay('8')" class="btn">8</button>
                    <button onclick="appendDisplay('9')" class="btn">9</button>
                    <button onclick="appendDisplay('*')" class="btn btn-operator">×</button>

                    <!-- Fifth Row -->
                    <button onclick="appendDisplay('4')" class="btn">4</button>
                    <button onclick="appendDisplay('5')" class="btn">5</button>
                    <button onclick="appendDisplay('6')" class="btn">6</button>
                    <button onclick="appendDisplay('-')" class="btn btn-operator">−</button>

                    <!-- Sixth Row -->
                    <button onclick="appendDisplay('1')" class="btn">1</button>
                    <button onclick="appendDisplay('2')" class="btn">2</button>
                    <button onclick="appendDisplay('3')" class="btn">3</button>
                    <button onclick="appendDisplay('+')" class="btn btn-operator">+</button>

                    <!-- Seventh Row -->
                    <button onclick="appendDisplay('0')" class="btn zero">0</button>
                    <button onclick="appendDisplay('.')" class="btn">.</button>
                    <button onclick="calculate()" class="btn btn-equals">=</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
